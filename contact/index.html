<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>联系方式 | 郭泽华 - 嵌入式工程师</title>
<meta property="og:title" content="郭泽华 | 嵌入式工程师">
<meta property="og:description" content="嵌入式工程师 · 硬件极客">
<meta property="og:type" content="website">

<meta name="description" content="联系郭泽华 - 嵌入式工程师, 欢迎技术交流与合作">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>
<div class="noise-overlay"></div>

<nav class="navbar" id="navbar">
  <div class="nav-inner">
    <a href="/" class="logo">GZH</a>
    <div class="nav-links" id="nav-links">
      <a href="/">首页</a>
      <a href="/about/">关于</a>
      <a href="/projects/">项目</a>
      <a href="/blog/">博客</a>
      <a href="/contact/" class="active">联系</a>
    </div>
    <button class="nav-toggle" id="nav-toggle" aria-label="菜单">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
<div class="nav-overlay" id="nav-overlay"></div>

<main><div class="reading-progress" id="readingProgress"><div class="rp-fill"></div></div>
  <div class="page-section">
    <div class="page-header reveal">
      <h2>联系方式</h2>
      <p>欢迎技术交流与合作</p>
      <div class="divider"></div>
    </div>

    <div class="contact-grid reveal reveal-delay-1">
      <div class="contact-card">
        <div class="contact-icon">@</div>
        <div>
          <p class="contact-label">邮箱</p>
          <a href="mailto:hello@guozehua.dev" class="contact-value">hello@guozehua.dev</a>
        </div>
      </div>
      <div class="contact-card">
        <div class="contact-icon">GH</div>
        <div>
          <p class="contact-label">GitHub</p>
          <a href="https://github.com/gzh8900" target="_blank" rel="noopener noreferrer" class="contact-value">github.com/gzh8900</a>
        </div>
      </div>
    </div>

    <div class="contact-form-container reveal reveal-delay-2">
      <h3>发送消息</h3>
      <form id="contact-form">
        <div class="form-fields">
          <div class="form-group">
            <label for="name">姓名</label>
            <input type="text" id="name" name="name" class="form-input" placeholder="你的名字" required>
          </div>
          <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" name="email" class="form-input" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label for="message">消息</label>
            <textarea id="message" name="message" class="form-input" placeholder="想说的话..." required></textarea>
          </div>
          <button type="submit" class="form-submit">发送消息</button>
          <p class="form-hint">演示用，不会真实发送</p>
        </div>
        <div class="form-success" id="form-success">
          <p>消息已发送！感谢你的留言。</p>
        </div>
      </form>
    </div>
  </div>
</main>

<footer>
  <p>&copy; 2026 郭泽华. 用 ❤️ 打造。</p>
</footer>

<script src="/assets/js/main.js"></script>
